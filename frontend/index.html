<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTrip - Intelligent Travel Planning</title>
    <link rel="stylesheet" href="styles/header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Main Header -->
    <header class="header" role="banner">
        <div class="header__container">
            <!-- Logo and Brand -->
            <div class="header__brand">
                <a href="/" class="header__logo" aria-label="SmartTrip Home">
                    <svg class="header__logo-icon" viewBox="0 0 32 32" aria-hidden="true">
                        <path d="M16 2L26 8v16l-10 6L6 24V8l10-6z" fill="currentColor"/>
                        <circle cx="16" cy="16" r="4" fill="white"/>
                    </svg>
                    <span class="header__logo-text">SmartTrip</span>
                </a>
            </div>

            <!-- Navigation -->
            <nav class="header__nav" role="navigation" aria-label="Main navigation">
                <ul class="header__nav-list">
                    <li class="header__nav-item">
                        <a href="/discover" class="header__nav-link">Discover</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="/trips" class="header__nav-link">My Trips</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="/recommendations" class="header__nav-link">Recommendations</a>
                    </li>
                    <li class="header__nav-item">
                        <a href="/help" class="header__nav-link">Help</a>
                    </li>
                </ul>
            </nav>

            <!-- User Actions -->
            <div class="header__actions">
                <button class="header__search-btn" aria-label="Search destinations" aria-expanded="false">
                    <svg class="header__icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </button>
                
                <div class="header__user-menu">
                    <button class="header__theme-toggle" aria-label="Toggle dark mode" data-theme="light">
                        <svg class="header__icon header__theme-icon header__theme-icon--light" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                        <svg class="header__icon header__theme-icon header__theme-icon--dark" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </button>
                    
                    <button class="header__user-btn" aria-label="User menu" aria-expanded="false" aria-haspopup="true">
                        <img src="https://via.placeholder.com/32x32/4F46E5/FFFFFF?text=U" alt="User avatar" class="header__avatar">
                    </button>
                    <div class="header__dropdown" role="menu" aria-hidden="true">
                        <a href="/profile" class="header__dropdown-item" role="menuitem">Profile</a>
                        <a href="/settings" class="header__dropdown-item" role="menuitem">Settings</a>
                        <hr class="header__dropdown-divider" role="separator">
                        <button class="header__dropdown-item header__dropdown-item--logout" role="menuitem">Sign Out</button>
                    </div>
                </div>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="header__mobile-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobile-menu">
                <span class="header__hamburger"></span>
                <span class="header__hamburger"></span>
                <span class="header__hamburger"></span>
            </button>
        </div>

        <!-- Mobile Navigation -->
        <nav class="header__mobile-nav" id="mobile-menu" role="navigation" aria-label="Mobile navigation" aria-hidden="true">
            <ul class="header__mobile-list">
                <li class="header__mobile-item">
                    <a href="/discover" class="header__mobile-link">Discover</a>
                </li>
                <li class="header__mobile-item">
                    <a href="/trips" class="header__mobile-link">My Trips</a>
                </li>
                <li class="header__mobile-item">
                    <a href="/recommendations" class="header__mobile-link">Recommendations</a>
                </li>
                <li class="header__mobile-item">
                    <a href="/help" class="header__mobile-link">Help</a>
                </li>
                <li class="header__mobile-item">
                    <button class="header__mobile-link header__mobile-theme-toggle" data-theme="light">
                        <span class="header__mobile-theme-text">Dark Mode</span>
                        <svg class="header__icon header__theme-icon header__theme-icon--light" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                        <svg class="header__icon header__theme-icon header__theme-icon--dark" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </button>
                </li>
                <li class="header__mobile-item header__mobile-item--divider">
                    <a href="/profile" class="header__mobile-link">Profile</a>
                </li>
                <li class="header__mobile-item">
                    <a href="/settings" class="header__mobile-link">Settings</a>
                </li>
                <li class="header__mobile-item">
                    <button class="header__mobile-link header__mobile-link--logout">Sign Out</button>
                </li>
            </ul>
        </nav>

        <!-- Search Overlay -->
        <div class="header__search-overlay" aria-hidden="true">
            <div class="header__search-container">
                <form class="header__search-form" role="search">
                    <label for="search-input" class="sr-only">Search destinations</label>
                    <input 
                        type="search" 
                        id="search-input"
                        class="header__search-input" 
                        placeholder="Search destinations, activities, or experiences..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button type="submit" class="header__search-submit" aria-label="Submit search">
                        <svg class="header__icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" fill="none"/>
                        </svg>
                    </button>
                </form>
                <button class="header__search-close" aria-label="Close search">
                    <svg class="header__icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="hero">
            <h1>Welcome to SmartTrip</h1>
            <p>Discover amazing destinations with AI-powered recommendations</p>
        </div>
    </main>

    <script src="scripts/header.js"></script>
</body>
</html>
