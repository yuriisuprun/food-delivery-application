server:
  port: ${PORT:8082}

spring:
  application:
    name: trip-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/smarttrip}
    username: ${DB_USER:smarttrip}
    password: ${DB_PASSWORD:smarttrip}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: trips
        format_sql: true

  flyway:
    enabled: true
    create-schemas: true
    schemas: trips
    default-schema: trips
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    secret: ${JWT_SECRET:dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev}