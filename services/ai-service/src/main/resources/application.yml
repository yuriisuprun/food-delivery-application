server:
  port: ${PORT:8083}

spring:
  application:
    name: ai-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smarttrip}
    username: ${DB_USER:smarttrip}
    password: ${DB_PASSWORD:smarttrip}
  flyway:
    enabled: true
    create-schemas: true
    schemas: ai
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dev-placeholder}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-mini}
    vectorstore:
      pgvector:
        initialize-schema: true
        schema-name: ai
        table-name: document_embeddings

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    secret: ${JWT_SECRET:dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev}

ai:
  prompts:
    itinerary:
      system: |
        You are an expert travel planner. Generate a realistic and optimized itinerary.
        Rules:
        - Respect budget, time constraints, logistics, plausible schedules, and travel times.
        - Provide a day-by-day plan with time slots.
        - Include cost estimates (transport, food, attractions) and low-cost alternatives.
        - Highlight assumptions and what is missing to improve the output.