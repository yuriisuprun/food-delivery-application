server:
  port: ${PORT:8084}

spring:
  application:
    name: recommendation-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smarttrip}
    username: ${DB_USER:smarttrip}
    password: ${DB_PASSWORD:smarttrip}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: recommendations
  flyway:
    enabled: true
    create-schemas: true
    schemas: recommendations
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    secret: ${JWT_SECRET:dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev}
