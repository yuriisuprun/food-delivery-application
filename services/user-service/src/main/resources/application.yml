server:
  port: ${PORT:8081}

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/smarttrip}
    username: ${DB_USER:smarttrip}
    password: ${DB_PASSWORD:smarttrip}

  jpa:
    hibernate:
      ddl-auto: none   # ✅ IMPORTANT FIX (Flyway owns schema)
    properties:
      hibernate:
        default_schema: users
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: users
    default-schema: users
    create-schemas: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    issuer: ${JWT_ISSUER:http://localhost:8081}
    secret: ${JWT_SECRET:dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev}