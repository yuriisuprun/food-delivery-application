apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip-service
  namespace: smarttrip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip-service
  template:
    metadata:
      labels:
        app: trip-service
    spec:
      containers:
        - name: trip-service
          image: ghcr.io/REPLACE_ME/trip-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: DB_URL
              valueFrom: { configMapKeyRef: { name: smarttrip-config, key: DB_URL } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: smarttrip-config, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: smarttrip-secrets, key: DB_PASSWORD } }
            - name: REDIS_HOST
              valueFrom: { configMapKeyRef: { name: smarttrip-config, key: REDIS_HOST } }
            - name: REDIS_PORT
              valueFrom: { configMapKeyRef: { name: smarttrip-config, key: REDIS_PORT } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: smarttrip-secrets, key: JWT_SECRET } }
          readinessProbe:
            httpGet: { path: /api/health, port: 8082 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8082 }
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: trip-service
  namespace: smarttrip
spec:
  selector:
    app: trip-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082

