apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: smarttrip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/REPLACE_ME/user-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: DB_URL
              valueFrom: { configMapKeyRef: { name: smarttrip-config, key: DB_URL } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: smarttrip-config, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: smarttrip-secrets, key: DB_PASSWORD } }
            - name: JWT_ISSUER
              valueFrom: { configMapKeyRef: { name: smarttrip-config, key: JWT_ISSUER } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: smarttrip-secrets, key: JWT_SECRET } }
          readinessProbe:
            httpGet: { path: /api/health, port: 8081 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8081 }
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: smarttrip
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081

