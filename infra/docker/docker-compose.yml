name: smarttrip

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      # Use official image bootstrap: creates DB + superuser role on first init.
      POSTGRES_USER: smarttrip
      POSTGRES_PASSWORD: smarttrip
      POSTGRES_DB: smarttrip
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarttrip -d smarttrip"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    environment:
      PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/smarttrip
      DB_USER: smarttrip
      DB_PASSWORD: smarttrip
      JWT_ISSUER: http://user-service:8081
      JWT_SECRET: dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  trip-service:
    build:
      context: ../..
      dockerfile: services/trip-service/Dockerfile
    environment:
      PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/smarttrip
      DB_USER: smarttrip
      DB_PASSWORD: smarttrip
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev
      AI_SERVICE_URL: http://ai-service:8083
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ../..
      dockerfile: services/ai-service/Dockerfile
    environment:
      PORT: 8083
      DB_URL: jdbc:postgresql://postgres:5432/smarttrip
      DB_USER: smarttrip
      DB_PASSWORD: smarttrip
      JWT_SECRET: dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dev-placeholder}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  recommendation-service:
    build:
      context: ../..
      dockerfile: services/recommendation-service/Dockerfile
    environment:
      PORT: 8084
      DB_URL: jdbc:postgresql://postgres:5432/smarttrip
      DB_USER: smarttrip
      DB_PASSWORD: smarttrip
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
